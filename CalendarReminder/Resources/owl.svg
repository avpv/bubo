<svg width="512" height="512" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Background rounded rect -->
  <rect x="5" y="5" width="90" height="90" rx="20" fill="#000000"/>

  <!-- Owl body (rounded rect) -->
  <rect x="15" y="25" width="70" height="70" rx="16" fill="#FFFFFF"/>

  <!-- Left ear triangle -->
  <polygon points="15,35 28,8 38,30" fill="#FFFFFF"/>

  <!-- Right ear triangle -->
  <polygon points="85,35 72,8 62,30" fill="#FFFFFF"/>

  <!-- Left eye (cut out) -->
  <circle cx="38" cy="42" r="10" fill="#000000"/>

  <!-- Right eye (cut out) -->
  <circle cx="62" cy="42" r="10" fill="#000000"/>

  <!-- Left pupil -->
  <circle cx="38" cy="42" r="5" fill="#FFFFFF"/>

  <!-- Right pupil -->
  <circle cx="62" cy="42" r="5" fill="#FFFFFF"/>

  <!-- Beak triangle -->
  <polygon points="44,60 50,68 56,60" fill="#FFFFFF"/>
</svg>

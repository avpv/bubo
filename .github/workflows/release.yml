name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build release binary
        run: swift build -c release

      - name: Create .app bundle
        run: |
          APP_DIR="CalendarReminder.app/Contents/MacOS"
          mkdir -p "$APP_DIR"
          cp .build/release/CalendarReminder "$APP_DIR/"

          cat > CalendarReminder.app/Contents/Info.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>CalendarReminder</string>
            <key>CFBundleIdentifier</key>
            <string>com.avpv.CalendarReminder</string>
            <key>CFBundleName</key>
            <string>CalendarReminder</string>
            <key>CFBundleVersion</key>
            <string>1.0</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>LSMinimumSystemVersion</key>
            <string>13.0</string>
            <key>LSUIElement</key>
            <true/>
          </dict>
          </plist>
          PLIST

      - name: Create DMG
        run: |
          mkdir -p dmg_contents
          cp -R CalendarReminder.app dmg_contents/
          ln -s /Applications dmg_contents/Applications
          hdiutil create -volname "CalendarReminder" -srcfolder dmg_contents -ov -format UDZO CalendarReminder.dmg

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            CalendarReminder.dmg
            CalendarReminder.app/Contents/MacOS/CalendarReminder

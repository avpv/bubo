name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build from (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Resolve tag
        id: tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG="${INPUT_TAG}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Build release binary
        run: swift build -c release

      - name: Create .app bundle
        env:
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          APP="CalendarReminder.app/Contents"

          mkdir -p "$APP/MacOS" "$APP/Resources"
          cp .build/release/CalendarReminder "$APP/MacOS/"
          cp CalendarReminder/Resources/AppIcon.icns "$APP/Resources/"

          cat > "$APP/Info.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>en</string>
            <key>CFBundleExecutable</key>
            <string>CalendarReminder</string>
            <key>CFBundleIconFile</key>
            <string>AppIcon</string>
            <key>CFBundleIdentifier</key>
            <string>com.avpv.CalendarReminder</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundleName</key>
            <string>CalendarReminder</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>${VERSION}</string>
            <key>CFBundleVersion</key>
            <string>${VERSION}</string>
            <key>LSMinimumSystemVersion</key>
            <string>13.0</string>
            <key>LSUIElement</key>
            <true/>
            <key>NSAppTransportSecurity</key>
            <dict>
              <key>NSAllowsArbitraryLoads</key>
              <false/>
            </dict>
          </dict>
          </plist>
          PLIST

      - name: Create DMG
        run: |
          mkdir -p dmg_contents
          cp -R CalendarReminder.app dmg_contents/
          ln -s /Applications dmg_contents/Applications
          hdiutil create \
            -volname "CalendarReminder" \
            -srcfolder dmg_contents \
            -ov -format UDZO \
            CalendarReminder.dmg

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          append_body: true
          body: |
            ## Installation

            1. Download **CalendarReminder.dmg**
            2. Open the DMG and drag **CalendarReminder** to **Applications**
            3. On first launch macOS will block the unsigned app:
               - Go to **System Settings → Privacy & Security** → scroll down → click **Open Anyway**
               - Or run: `xattr -cr /Applications/CalendarReminder.app`
          files: CalendarReminder.dmg

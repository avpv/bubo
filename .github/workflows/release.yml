name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build from (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Resolve tag
        id: tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG="${INPUT_TAG}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Build release binary
        id: build
        run: |
          swift build -c release
          BIN_PATH=$(swift build -c release --show-bin-path)
          echo "bin_path=${BIN_PATH}" >> "$GITHUB_OUTPUT"

      - name: Create .app bundle
        env:
          VERSION: ${{ steps.tag.outputs.version }}
          BIN_PATH: ${{ steps.build.outputs.bin_path }}
        run: |
          APP="Bubo.app/Contents"

          mkdir -p "$APP/MacOS" "$APP/Resources"
          cp "${BIN_PATH}/Bubo" "$APP/MacOS/"
          cp Bubo/Resources/AppIcon.icns "$APP/Resources/"
          # Copy SPM resource bundle so Bundle.module works at runtime
          cp -R "${BIN_PATH}/Bubo_Bubo.bundle" "$APP/Resources/"

          cat > "$APP/Info.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>en</string>
            <key>CFBundleExecutable</key>
            <string>Bubo</string>
            <key>CFBundleIconFile</key>
            <string>AppIcon</string>
            <key>NSPrincipalClass</key>
            <string>NSApplication</string>
            <key>CFBundleIdentifier</key>
            <string>com.avpv.Bubo</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundleName</key>
            <string>Bubo</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>PLACEHOLDER_VERSION</string>
            <key>CFBundleVersion</key>
            <string>PLACEHOLDER_VERSION</string>
            <key>LSMinimumSystemVersion</key>
            <string>13.0</string>
            <key>LSUIElement</key>
            <true/>
            <key>NSAppTransportSecurity</key>
            <dict>
              <key>NSAllowsArbitraryLoads</key>
              <false/>
            </dict>
            <key>NSCalendarsUsageDescription</key>
            <string>Bubo needs access to your calendars to show meeting reminders from accounts configured in the Calendar app.</string>
            <key>NSCalendarsFullAccessUsageDescription</key>
            <string>Bubo needs access to your calendars to show meeting reminders from accounts configured in the Calendar app.</string>
          </dict>
          </plist>
          PLIST
          sed -i '' "s/PLACEHOLDER_VERSION/${VERSION}/g" "$APP/Info.plist"

          # Ad-hoc sign the app so it runs locally, and provide the correct entitlements
          codesign --force --deep --entitlements "Bubo/Bubo.entitlements" --sign - "Bubo.app"

      - name: Create DMG
        run: |
          # Pin create-dmg version — no brew, no moving targets
          curl -fsSL https://github.com/create-dmg/create-dmg/archive/refs/tags/v1.2.3.tar.gz | tar xz
          CREATE_DMG="./create-dmg-1.2.3/create-dmg"

          # create-dmg exits 2 when no signing identity is found — expected in CI
          "$CREATE_DMG" \
            --volname "Bubo" \
            --volicon "Bubo/Resources/AppIcon.icns" \
            --background "packaging/dmg_background.png" \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 128 \
            --text-size 14 \
            --icon "Bubo.app" 180 200 \
            --hide-extension "Bubo.app" \
            --app-drop-link 480 200 \
            "Bubo.dmg" \
            "Bubo.app" \
            || test $? -eq 2

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          append_body: true
          body: |
            ## Installation

            One command in Terminal:
            ```
            curl -fsSL https://raw.githubusercontent.com/avpv/bubo/HEAD/scripts/install.sh | bash
            ```

            Or manually:
            1. Download **Bubo.dmg**
            2. Open the DMG and drag **Bubo** to **Applications**
            3. Run `xattr -cr /Applications/Bubo.app` and launch
          files: Bubo.dmg

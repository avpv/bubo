name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build from (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Resolve tag
        id: tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG="${INPUT_TAG}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Build release binary
        id: build
        run: |
          swift build -c release
          BIN_PATH=$(swift build -c release --show-bin-path)
          echo "bin_path=${BIN_PATH}" >> "$GITHUB_OUTPUT"

      - name: Create .app bundle
        env:
          VERSION: ${{ steps.tag.outputs.version }}
          BIN_PATH: ${{ steps.build.outputs.bin_path }}
        run: |
          APP="Owlenda.app/Contents"

          mkdir -p "$APP/MacOS" "$APP/Resources"
          cp "${BIN_PATH}/Owlenda" "$APP/MacOS/"
          cp Owlenda/Resources/AppIcon.icns "$APP/Resources/"
          # Copy SPM resource bundle so Bundle.module works at runtime
          cp -R "${BIN_PATH}/Owlenda_Owlenda.bundle" "$APP/Resources/"

          cat > "$APP/Info.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>en</string>
            <key>CFBundleExecutable</key>
            <string>Owlenda</string>
            <key>CFBundleIconFile</key>
            <string>AppIcon</string>
            <key>NSPrincipalClass</key>
            <string>NSApplication</string>
            <key>CFBundleIdentifier</key>
            <string>com.avpv.Owlenda</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundleName</key>
            <string>Owlenda</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>PLACEHOLDER_VERSION</string>
            <key>CFBundleVersion</key>
            <string>PLACEHOLDER_VERSION</string>
            <key>LSMinimumSystemVersion</key>
            <string>13.0</string>
            <key>LSUIElement</key>
            <true/>
            <key>NSAppTransportSecurity</key>
            <dict>
              <key>NSAllowsArbitraryLoads</key>
              <false/>
            </dict>
          </dict>
          </plist>
          PLIST
          sed -i '' "s/PLACEHOLDER_VERSION/${VERSION}/g" "$APP/Info.plist"

      - name: Create DMG
        run: |
          mkdir -p dmg_contents
          cp -R Owlenda.app dmg_contents/
          ln -s /Applications dmg_contents/Applications
          hdiutil create \
            -volname "Owlenda" \
            -srcfolder dmg_contents \
            -ov -format UDZO \
            Owlenda.dmg

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          append_body: true
          body: |
            ## Installation

            1. Download **Owlenda.dmg**
            2. Open the DMG and drag **Owlenda** to **Applications**
            3. On first launch macOS will block the unsigned app:
               - Go to **System Settings → Privacy & Security** → scroll down → click **Open Anyway**
               - Or run: `xattr -cr /Applications/Owlenda.app`
          files: Owlenda.dmg

<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="0.5" fill="#FFFFFF" opacity="0.07"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#dots)"/>

  <!-- Owl icon — centered, top area -->
  <g transform="translate(540, 60) scale(2)">
    <rect x="15" y="25" width="70" height="70" rx="16" fill="#FFFFFF" filter="url(#glow)"/>
    <polygon points="15,35 28,8 38,30" fill="#FFFFFF"/>
    <polygon points="85,35 72,8 62,30" fill="#FFFFFF"/>
    <circle cx="38" cy="42" r="10" fill="#000000"/>
    <circle cx="62" cy="42" r="10" fill="#000000"/>
    <circle cx="38" cy="42" r="5" fill="#FFFFFF"/>
    <circle cx="62" cy="42" r="5" fill="#FFFFFF"/>
    <polygon points="44,60 50,68 56,60" fill="#000000" opacity="0.15"/>
  </g>

  <!-- App name -->
  <text x="640" y="365" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-size="88" font-weight="700" letter-spacing="8" fill="#FFFFFF">
    Bubo
  </text>

  <!-- Tagline -->
  <text x="640" y="420" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif"
        font-size="24" font-weight="400" letter-spacing="4" fill="#FFFFFF" opacity="0.5">
    SMART CALENDAR FOR YOUR MENU BAR
  </text>

  <!-- Feature pills row -->
  <g transform="translate(640, 500)" text-anchor="middle"
     font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif"
     font-size="15" font-weight="500" letter-spacing="1.5">
    <rect x="-340" y="-20" width="130" height="34" rx="17" fill="#FFFFFF" opacity="0.07" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="0.5"/>
    <text x="-275" y="4" fill="#FFFFFF" opacity="0.6">Timeline</text>
    <rect x="-185" y="-20" width="140" height="34" rx="17" fill="#FFFFFF" opacity="0.07" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="0.5"/>
    <text x="-115" y="4" fill="#FFFFFF" opacity="0.6">Pomodoro</text>
    <rect x="-20" y="-20" width="145" height="34" rx="17" fill="#FFFFFF" opacity="0.07" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="0.5"/>
    <text x="52" y="4" fill="#FFFFFF" opacity="0.6">Reminders</text>
    <rect x="150" y="-20" width="190" height="34" rx="17" fill="#FFFFFF" opacity="0.07" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="0.5"/>
    <text x="245" y="4" fill="#FFFFFF" opacity="0.6">Native macOS</text>
  </g>

  <!-- Bottom -->
  <text x="640" y="585" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif"
        font-size="14" font-weight="400" letter-spacing="2.5" fill="#FFFFFF" opacity="0.25">
    BUILT WITH SWIFT &amp; SWIFTUI
  </text>
</svg>

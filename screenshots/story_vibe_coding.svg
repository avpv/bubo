<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#ffffff"/>

  <style>
    text { font-family: 'Segoe Print', 'Comic Sans MS', 'Patrick Hand', cursive; }

    @keyframes fadeInLeft { 0% { opacity: 0; transform: translateX(-20px); } 25% { opacity: 1; transform: translateX(0); } }
    @keyframes fadeInRight { 0%, 30% { opacity: 0; transform: translateX(20px); } 55% { opacity: 1; transform: translateX(0); } }
    @keyframes steam { 0%, 100% { opacity: 0.3; transform: translateY(0); } 50% { opacity: 0.8; transform: translateY(-4px); } }
    @keyframes codePulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
    @keyframes owlWatch { 0%, 85%, 100% { r: 1; } 88%, 95% { r: 0.2; } }
    @keyframes alertSlideUp { 0%, 50% { opacity: 0; transform: translateY(20px); } 70% { opacity: 1; transform: translateY(0); } }
    @keyframes countdownPulse { 0%, 100% { opacity: 0.7; fill: #4fc08d; } 50% { opacity: 1; fill: #6fd8a8; } }
    @keyframes swipeAway { 0%, 15% { opacity: 1; transform: translateX(0); } 25% { opacity: 0; transform: translateX(30px); } 100% { opacity: 0; } }
    @keyframes resultFade { 0%, 75% { opacity: 0; } 90% { opacity: 1; } }

    .left-side { animation: fadeInLeft 5s ease-out both; }
    .right-side { animation: fadeInRight 5s ease-out both; }
    .steam1 { animation: steam 3s ease-in-out infinite; }
    .steam2 { animation: steam 3s ease-in-out 0.5s infinite; }
    .code-line { animation: codePulse 3s ease-in-out infinite; }
    .alert-box { animation: alertSlideUp 5s ease-out both; }
    .countdown { animation: countdownPulse 1.5s ease-in-out infinite; }
    .swipe { animation: swipeAway 6s ease-out both; }
    .result-left { animation: resultFade 5s ease-out both; }
    .result-right { animation: resultFade 5s ease-out both; }
  </style>

  <!-- LEFT SIDE: Without Bubo -->
  <g transform="translate(0, 0)" class="left-side">
    <text x="195" y="30" font-size="16" fill="#d44" text-anchor="middle" font-weight="bold">without Bubo</text>
    <line x1="120" y1="36" x2="270" y2="36" stroke="#d44" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="4,3"/>

    <!-- Clock -->
    <g transform="translate(30, 50)">
      <circle cx="30" cy="30" r="22" fill="none" stroke="#222" stroke-width="2"/>
      <line x1="30" y1="30" x2="30" y2="14" stroke="#222" stroke-width="2" stroke-linecap="round"/>
      <line x1="30" y1="30" x2="22" y2="30" stroke="#222" stroke-width="1.5" stroke-linecap="round"/>
      <circle cx="30" cy="30" r="2" fill="#222"/>
      <text x="30" y="70" font-size="12" fill="#666" text-anchor="middle">2:00 AM</text>
    </g>

    <!-- Coder at desk -->
    <g transform="translate(100, 85)">
      <path d="M-30,100 L200,100" stroke="#222" stroke-width="2" stroke-linecap="round"/>
      <rect x="40" y="25" width="90" height="60" rx="4" fill="#1a1a2e" stroke="#222" stroke-width="2"/>
      <line x1="48" y1="38" x2="70" y2="38" stroke="#4fc" stroke-width="1.5" stroke-linecap="round" class="code-line"/>
      <line x1="73" y1="38" x2="95" y2="38" stroke="#f8a" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="52" y1="46" x2="80" y2="46" stroke="#8bf" stroke-width="1.5" stroke-linecap="round" class="code-line"/>
      <line x1="52" y1="54" x2="68" y2="54" stroke="#fa4" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="71" y1="54" x2="92" y2="54" stroke="#4fc" stroke-width="1.5" stroke-linecap="round" class="code-line"/>
      <line x1="48" y1="62" x2="85" y2="62" stroke="#f8a" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="48" y1="70" x2="60" y2="70" stroke="#8bf" stroke-width="1.5" stroke-linecap="round"/>
      <rect x="75" y="85" width="20" height="15" fill="none" stroke="#222" stroke-width="1.5"/>
      <path d="M52,115 Q52,105 60,105 Q68,105 68,115" fill="none" stroke="#222" stroke-width="2" stroke-linecap="round"/>
      <rect x="48" y="113" width="6" height="8" rx="2" fill="#222"/>
      <rect x="66" y="113" width="6" height="8" rx="2" fill="#222"/>
      <text x="60" y="135" font-size="8" fill="#888" text-anchor="middle">lo-fi beats</text>

      <!-- Coffee -->
      <path d="M150,80 L150,98 Q150,104 156,104 L164,104 Q170,104 170,98 L170,80 Z" fill="none" stroke="#222" stroke-width="1.5"/>
      <path d="M170,86 Q178,86 178,92 Q178,98 170,98" fill="none" stroke="#222" stroke-width="1.5"/>
      <path d="M155,76 Q157,70 155,64" fill="none" stroke="#bbb" stroke-width="1" stroke-linecap="round" class="steam1"/>
      <path d="M162,74 Q164,68 162,62" fill="none" stroke="#bbb" stroke-width="1" stroke-linecap="round" class="steam2"/>
    </g>

    <!-- Tiny notification swiped away -->
    <g transform="translate(105, 55)" class="swipe">
      <rect x="0" y="0" width="80" height="18" rx="4" fill="#f0f0f0" stroke="#ccc" stroke-width="1" opacity="0.7"/>
      <text x="8" y="13" font-size="7" fill="#aaa">Standup 9:00am</text>
      <path d="M85,9 Q95,9 100,4" fill="none" stroke="#ccc" stroke-width="1.5" stroke-linecap="round"/>
      <text x="105" y="8" font-size="9" fill="#ccc">~</text>
    </g>

    <!-- Missed result -->
    <g transform="translate(60, 280)" class="result-left">
      <text x="130" y="0" font-size="13" fill="#d44" text-anchor="middle" font-style="italic">"I swear I set a reminder..."</text>
      <g transform="translate(40, 20)">
        <circle cx="90" cy="30" r="12" fill="none" stroke="#222" stroke-width="2"/>
        <path d="M82,28 Q90,22 98,28" fill="none" stroke="#222" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M78,25 Q85,20 92,25" fill="none" stroke="#222" stroke-width="2" stroke-linecap="round"/>
        <text x="90" y="65" font-size="10" fill="#d44" text-anchor="middle">missed standup</text>
        <text x="90" y="78" font-size="10" fill="#d44" text-anchor="middle">...again</text>
      </g>
    </g>
  </g>

  <!-- Divider -->
  <line x1="395" y1="20" x2="395" y2="380" stroke="#ddd" stroke-width="2" stroke-dasharray="8,6"/>
  <text x="395" y="395" font-size="11" fill="#bbb" text-anchor="middle">vs</text>

  <!-- RIGHT SIDE: With Bubo -->
  <g transform="translate(410, 0)" class="right-side">
    <text x="190" y="30" font-size="16" fill="#2a9d4e" text-anchor="middle" font-weight="bold">with Bubo</text>
    <line x1="120" y1="36" x2="260" y2="36" stroke="#2a9d4e" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="4,3"/>

    <!-- Same clock -->
    <g transform="translate(30, 50)">
      <circle cx="30" cy="30" r="22" fill="none" stroke="#222" stroke-width="2"/>
      <line x1="30" y1="30" x2="30" y2="14" stroke="#222" stroke-width="2" stroke-linecap="round"/>
      <line x1="30" y1="30" x2="22" y2="30" stroke="#222" stroke-width="1.5" stroke-linecap="round"/>
      <circle cx="30" cy="30" r="2" fill="#222"/>
      <text x="30" y="70" font-size="12" fill="#666" text-anchor="middle">2:00 AM</text>
    </g>

    <!-- Same coder -->
    <g transform="translate(100, 85)">
      <path d="M-30,100 L200,100" stroke="#222" stroke-width="2" stroke-linecap="round"/>
      <rect x="40" y="25" width="90" height="60" rx="4" fill="#1a1a2e" stroke="#222" stroke-width="2"/>
      <line x1="48" y1="38" x2="70" y2="38" stroke="#4fc" stroke-width="1.5" stroke-linecap="round" class="code-line"/>
      <line x1="73" y1="38" x2="95" y2="38" stroke="#f8a" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="52" y1="46" x2="80" y2="46" stroke="#8bf" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="52" y1="54" x2="68" y2="54" stroke="#fa4" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="71" y1="54" x2="92" y2="54" stroke="#4fc" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="48" y1="62" x2="85" y2="62" stroke="#f8a" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="48" y1="70" x2="60" y2="70" stroke="#8bf" stroke-width="1.5" stroke-linecap="round"/>
      <rect x="75" y="85" width="20" height="15" fill="none" stroke="#222" stroke-width="1.5"/>
    </g>

    <!-- Owl watching with blinking eyes -->
    <g transform="translate(310, 55)">
      <circle cx="15" cy="15" r="12" fill="none" stroke="#2a9d4e" stroke-width="2"/>
      <circle cx="11" cy="13" r="3" fill="none" stroke="#2a9d4e" stroke-width="1.5"/>
      <circle cx="19" cy="13" r="3" fill="none" stroke="#2a9d4e" stroke-width="1.5"/>
      <circle cx="11" cy="13" r="1" fill="#2a9d4e">
        <animate attributeName="r" values="1;1;0.2;0.2;1;1" dur="3.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="19" cy="13" r="1" fill="#2a9d4e">
        <animate attributeName="r" values="1;1;0.2;0.2;1;1" dur="3.5s" repeatCount="indefinite"/>
      </circle>
      <polygon points="15,16 13,19 17,19" fill="#e8a030"/>
      <line x1="7" y1="6" x2="5" y2="1" stroke="#2a9d4e" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="23" y1="6" x2="25" y2="1" stroke="#2a9d4e" stroke-width="1.5" stroke-linecap="round"/>
      <text x="15" y="42" font-size="9" fill="#2a9d4e" text-anchor="middle">watching...</text>
    </g>

    <!-- FULL SCREEN ALERT -->
    <g transform="translate(20, 225)" class="alert-box">
      <text x="170" y="0" font-size="12" fill="#666" text-anchor="middle">next morning, 8:30 AM</text>

      <rect x="40" y="10" width="260" height="120" rx="8" fill="#1a1a2e" stroke="#222" stroke-width="2.5"/>
      <text x="170" y="45" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="bold">Daily Standup</text>
      <text x="170" y="80" font-size="30" text-anchor="middle" font-weight="bold" class="countdown" fill="#4fc08d">30:00</text>

      <rect x="100" y="95" width="60" height="22" rx="6" fill="none" stroke="#4fc08d" stroke-width="1.5"/>
      <text x="130" y="110" font-size="10" fill="#4fc08d" text-anchor="middle">Snooze</text>
      <rect x="180" y="95" width="60" height="22" rx="6" fill="#4fc08d" stroke="#4fc08d" stroke-width="1.5"/>
      <text x="210" y="110" font-size="10" fill="#1a1a2e" text-anchor="middle">Dismiss</text>

      <text x="320" y="70" font-size="12" fill="#2a9d4e" transform="rotate(-5, 320, 70)">can't miss</text>
      <text x="320" y="85" font-size="12" fill="#2a9d4e" transform="rotate(-5, 320, 85)">this one!</text>
      <path d="M315,65 Q305,55 290,50" fill="none" stroke="#2a9d4e" stroke-width="1.5" stroke-linecap="round"/>
      <polygon points="290,50 296,48 293,55" fill="#2a9d4e"/>
    </g>

    <!-- Result -->
    <g transform="translate(80, 365)" class="result-right">
      <text x="110" y="0" font-size="13" fill="#2a9d4e" text-anchor="middle" font-weight="bold">on time. every time.</text>
    </g>
  </g>
</svg>
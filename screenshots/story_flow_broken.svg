<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" width="800" height="320">
  <rect width="800" height="320" fill="#ffffff"/>

  <style>
    text { font-family: 'Segoe Print', 'Comic Sans MS', 'Patrick Hand', cursive; }
  </style>

  <!-- Scene 1: Coder in flow -->
  <g transform="translate(80, 40)">
    <!-- Label -->
    <text x="60" y="0" font-size="13" fill="#888" text-anchor="middle">you, in the zone</text>

    <!-- Laptop body -->
    <path d="M20,90 Q18,88 20,60 Q22,32 60,30 Q98,32 100,60 Q102,88 100,90 Z"
          fill="none" stroke="#222" stroke-width="2" stroke-linecap="round"
          style="filter: url(#rough)"/>
    <path d="M25,65 L95,65 L95,82 L25,82 Z" fill="#e8f4e8" stroke="#222" stroke-width="1.5" stroke-linecap="round"/>
    <!-- code lines on screen -->
    <line x1="30" y1="70" x2="55" y2="70" stroke="#4a9" stroke-width="2" stroke-linecap="round"/>
    <line x1="58" y1="70" x2="75" y2="70" stroke="#a4d" stroke-width="2" stroke-linecap="round"/>
    <line x1="30" y1="75" x2="48" y2="75" stroke="#49a" stroke-width="2" stroke-linecap="round"/>
    <line x1="51" y1="75" x2="70" y2="75" stroke="#4a9" stroke-width="2" stroke-linecap="round"/>
    <!-- keyboard base -->
    <path d="M10,92 Q8,90 15,90 L105,90 Q112,90 110,92 L108,100 Q106,104 100,104 L20,104 Q14,104 12,100 Z"
          fill="none" stroke="#222" stroke-width="2" stroke-linecap="round"/>

    <!-- Person (stick figure) -->
    <circle cx="60" cy="130" r="14" fill="none" stroke="#222" stroke-width="2"/>
    <!-- happy eyes -->
    <circle cx="54" cy="128" r="1.5" fill="#222"/>
    <circle cx="66" cy="128" r="1.5" fill="#222"/>
    <!-- smile -->
    <path d="M54,135 Q60,140 66,135" fill="none" stroke="#222" stroke-width="1.5" stroke-linecap="round"/>
    <!-- body -->
    <line x1="60" y1="144" x2="60" y2="190" stroke="#222" stroke-width="2" stroke-linecap="round"/>
    <!-- arms typing -->
    <path d="M60,160 Q40,170 25,95" fill="none" stroke="#222" stroke-width="2" stroke-linecap="round"/>
    <path d="M60,160 Q80,170 95,95" fill="none" stroke="#222" stroke-width="2" stroke-linecap="round"/>
    <!-- legs -->
    <line x1="60" y1="190" x2="40" y2="230" stroke="#222" stroke-width="2" stroke-linecap="round"/>
    <line x1="60" y1="190" x2="80" y2="230" stroke="#222" stroke-width="2" stroke-linecap="round"/>

    <!-- thought bubbles -->
    <circle cx="100" cy="40" r="4" fill="#ddd" stroke="#222" stroke-width="1"/>
    <circle cx="112" cy="28" r="6" fill="#ddd" stroke="#222" stroke-width="1"/>
    <ellipse cx="138" cy="16" rx="30" ry="14" fill="#ddd" stroke="#222" stroke-width="1.5"/>
    <text x="138" y="20" font-size="11" fill="#333" text-anchor="middle">brilliant idea!</text>

    <!-- sparkles -->
    <text x="5" y="55" font-size="16" fill="#f5c542">*</text>
    <text x="115" y="50" font-size="14" fill="#f5c542">*</text>
    <text x="0" y="80" font-size="12" fill="#f5c542">*</text>
  </g>

  <!-- Arrow 1 -->
  <g transform="translate(270, 130)">
    <path d="M0,10 Q30,5 55,10" fill="none" stroke="#999" stroke-width="2" stroke-dasharray="6,4" stroke-linecap="round"/>
    <polygon points="55,10 48,4 48,16" fill="#999"/>
    <text x="27" y="0" font-size="11" fill="#999" text-anchor="middle">then...</text>
  </g>

  <!-- Scene 2: Notification interrupts -->
  <g transform="translate(360, 40)">
    <text x="60" y="0" font-size="13" fill="#888" text-anchor="middle">notification hits</text>

    <!-- notification popup -->
    <g transform="translate(10, 15)">
      <rect x="0" y="0" width="120" height="45" rx="8" ry="8" fill="#fff4e0" stroke="#e8a030" stroke-width="2"/>
      <text x="10" y="18" font-size="10" fill="#b07020" font-weight="bold">Weekly Sync</text>
      <text x="10" y="32" font-size="9" fill="#b07020">in 5 minutes</text>
      <!-- bell icon -->
      <circle cx="105" cy="15" r="8" fill="#f0c050" stroke="#e8a030" stroke-width="1.5"/>
      <text x="105" y="19" font-size="10" text-anchor="middle" fill="#b07020">!</text>
      <!-- shake lines -->
      <line x1="96" y1="8" x2="92" y2="4" stroke="#e8a030" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="114" y1="8" x2="118" y2="4" stroke="#e8a030" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="96" y1="22" x2="92" y2="26" stroke="#e8a030" stroke-width="1.5" stroke-linecap="round"/>
    </g>

    <!-- Person distracted -->
    <circle cx="60" cy="130" r="14" fill="none" stroke="#222" stroke-width="2"/>
    <!-- confused eyes -->
    <circle cx="54" cy="127" r="1.5" fill="#222"/>
    <circle cx="66" cy="127" r="1.5" fill="#222"/>
    <!-- :O mouth -->
    <ellipse cx="60" cy="137" rx="4" ry="3" fill="none" stroke="#222" stroke-width="1.5"/>
    <!-- body -->
    <line x1="60" y1="144" x2="60" y2="190" stroke="#222" stroke-width="2" stroke-linecap="round"/>
    <!-- arms up in surprise -->
    <path d="M60,160 Q35,145 30,120" fill="none" stroke="#222" stroke-width="2" stroke-linecap="round"/>
    <path d="M60,160 Q85,145 90,120" fill="none" stroke="#222" stroke-width="2" stroke-linecap="round"/>
    <!-- legs -->
    <line x1="60" y1="190" x2="40" y2="230" stroke="#222" stroke-width="2" stroke-linecap="round"/>
    <line x1="60" y1="190" x2="80" y2="230" stroke="#222" stroke-width="2" stroke-linecap="round"/>

    <!-- thought bubble popping -->
    <circle cx="100" cy="95" r="4" fill="#eee" stroke="#ccc" stroke-width="1" stroke-dasharray="2,2"/>
    <circle cx="115" cy="82" r="6" fill="#eee" stroke="#ccc" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="106" y="75" font-size="14" fill="#d44">poof</text>

    <!-- stress lines -->
    <line x1="40" y1="115" x2="35" y2="110" stroke="#d44" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="80" y1="115" x2="85" y2="110" stroke="#d44" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Arrow 2 -->
  <g transform="translate(510, 130)">
    <path d="M0,10 Q30,5 55,10" fill="none" stroke="#999" stroke-width="2" stroke-dasharray="6,4" stroke-linecap="round"/>
    <polygon points="55,10 48,4 48,16" fill="#999"/>
    <text x="27" y="0" font-size="11" fill="#999" text-anchor="middle">result</text>
  </g>

  <!-- Scene 3: Lost flow -->
  <g transform="translate(600, 40)">
    <text x="70" y="0" font-size="13" fill="#888" text-anchor="middle">flow is gone</text>

    <!-- Laptop with blank screen -->
    <path d="M30,90 Q28,88 30,60 Q32,32 70,30 Q108,32 110,60 Q112,88 110,90 Z"
          fill="none" stroke="#222" stroke-width="2" stroke-linecap="round"/>
    <path d="M35,65 L105,65 L105,82 L35,82 Z" fill="#f5f5f5" stroke="#222" stroke-width="1.5"/>
    <!-- cursor blinking -->
    <line x1="42" y1="70" x2="42" y2="78" stroke="#222" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <text x="48" y="77" font-size="9" fill="#aaa">???</text>
    <!-- keyboard base -->
    <path d="M20,92 Q18,90 25,90 L115,90 Q122,90 120,92 L118,100 Q116,104 110,104 L30,104 Q24,104 22,100 Z"
          fill="none" stroke="#222" stroke-width="2"/>

    <!-- Person sad -->
    <circle cx="70" cy="130" r="14" fill="none" stroke="#222" stroke-width="2"/>
    <!-- sad eyes -->
    <circle cx="64" cy="127" r="1.5" fill="#222"/>
    <circle cx="76" cy="127" r="1.5" fill="#222"/>
    <!-- frown -->
    <path d="M64,138 Q70,133 76,138" fill="none" stroke="#222" stroke-width="1.5" stroke-linecap="round"/>
    <!-- body slumped -->
    <path d="M70,144 Q68,165 66,190" fill="none" stroke="#222" stroke-width="2" stroke-linecap="round"/>
    <!-- arms droopy -->
    <path d="M68,160 Q50,175 35,180" fill="none" stroke="#222" stroke-width="2" stroke-linecap="round"/>
    <path d="M68,160 Q90,175 105,180" fill="none" stroke="#222" stroke-width="2" stroke-linecap="round"/>
    <!-- legs -->
    <line x1="66" y1="190" x2="46" y2="230" stroke="#222" stroke-width="2" stroke-linecap="round"/>
    <line x1="66" y1="190" x2="86" y2="230" stroke="#222" stroke-width="2" stroke-linecap="round"/>

    <!-- sadness cloud -->
    <text x="30" y="118" font-size="11" fill="#999">. . .</text>
  </g>

  <!-- Bottom label -->
  <text x="400" y="300" font-size="16" fill="#d44" text-anchor="middle" font-weight="bold">this happens twelve times a day</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 250" width="750" height="250">
  <rect width="750" height="250" fill="#ffffff"/>

  <style>
    text { font-family: 'Segoe Print', 'Comic Sans MS', 'Patrick Hand', cursive; }

    @keyframes popIn1 { 0%, 5% { opacity: 0; transform: scale(0.8); } 18% { opacity: 1; transform: scale(1); } }
    @keyframes popIn2 { 0%, 12% { opacity: 0; transform: scale(0.8); } 25% { opacity: 1; transform: scale(1); } }
    @keyframes popIn3 { 0%, 19% { opacity: 0; transform: scale(0.8); } 32% { opacity: 1; transform: scale(1); } }
    @keyframes popIn4 { 0%, 26% { opacity: 0; transform: scale(0.8); } 39% { opacity: 1; transform: scale(1); } }
    @keyframes popIn5 { 0%, 33% { opacity: 0; transform: scale(0.8); } 46% { opacity: 1; transform: scale(1); } }
    @keyframes popIn6 { 0%, 40% { opacity: 0; transform: scale(0.8); } 53% { opacity: 1; transform: scale(1); } }
    @keyframes popIn7 { 0%, 47% { opacity: 0; transform: scale(0.8); } 60% { opacity: 1; transform: scale(1); } }
    @keyframes ringRotate { 0% { stroke-dashoffset: 0; } 100% { stroke-dashoffset: -88; } }
    @keyframes fadeInAlert { 0%, 55% { opacity: 0; } 70% { opacity: 1; } }
    @keyframes fadeInOwl { 0%, 65% { opacity: 0; } 80% { opacity: 1; } }
    @keyframes owlBlink { 0%, 90%, 100% { r: 1.5; } 93%, 97% { r: 0.3; } }
    @keyframes timerPulse { 0%, 100% { opacity: 0.8; } 50% { opacity: 1; } }
    @keyframes arrowFade1 { 0%, 10% { opacity: 0; } 22% { opacity: 1; } }
    @keyframes arrowFade2 { 0%, 17% { opacity: 0; } 30% { opacity: 1; } }
    @keyframes arrowFade3 { 0%, 30% { opacity: 0; } 42% { opacity: 1; } }
    @keyframes arrowFade4 { 0%, 37% { opacity: 0; } 50% { opacity: 1; } }
    @keyframes arrowFade5 { 0%, 44% { opacity: 0; } 57% { opacity: 1; } }

    .block1 { animation: popIn1 5s ease-out both; }
    .block2 { animation: popIn2 5s ease-out both; }
    .block3 { animation: popIn3 5s ease-out both; }
    .block4 { animation: popIn4 5s ease-out both; }
    .block5 { animation: popIn5 5s ease-out both; }
    .block6 { animation: popIn6 5s ease-out both; }
    .block7 { animation: popIn7 5s ease-out both; }
    .arrow1 { animation: arrowFade1 5s ease-out both; }
    .arrow2 { animation: arrowFade2 5s ease-out both; }
    .arrow3 { animation: arrowFade3 5s ease-out both; }
    .arrow4 { animation: arrowFade4 5s ease-out both; }
    .arrow5 { animation: arrowFade5 5s ease-out both; }
    .ring { animation: ringRotate 8s linear infinite; }
    .alert { animation: fadeInAlert 5s ease-out both; }
    .owl { animation: fadeInOwl 5s ease-out both; }
    .timer-pulse { animation: timerPulse 2s ease-in-out infinite; }
  </style>

  <!-- Title -->
  <text x="375" y="25" font-size="15" fill="#222" text-anchor="middle" font-weight="bold">the Pomodoro rhythm</text>

  <!-- Round 1 -->
  <g transform="translate(30, 50)" class="block1">
    <rect x="0" y="20" width="110" height="65" rx="8" fill="#e8f5e8" stroke="#4a9d6e" stroke-width="2"/>
    <text x="55" y="45" font-size="11" fill="#2d7a4a" text-anchor="middle" font-weight="bold">WORK</text>
    <text x="55" y="62" font-size="20" fill="#2d7a4a" text-anchor="middle" font-weight="bold">25:00</text>
    <text x="55" y="78" font-size="9" fill="#4a9d6e" text-anchor="middle">deep focus</text>

    <circle cx="55" cy="105" r="14" fill="none" stroke="#4a9d6e" stroke-width="2.5" stroke-dasharray="66,22" stroke-linecap="round" class="ring"/>
    <text x="55" y="110" font-size="9" fill="#4a9d6e" text-anchor="middle">3/4</text>

    <text x="55" y="14" font-size="10" fill="#888" text-anchor="middle">Round 1</text>
  </g>

  <!-- Arrow -->
  <g transform="translate(145, 75)" class="arrow1">
    <path d="M0,10 Q12,7 22,10" fill="none" stroke="#bbb" stroke-width="2" stroke-linecap="round"/>
    <polygon points="22,10 17,6 17,14" fill="#bbb"/>
  </g>

  <!-- Break 1 -->
  <g transform="translate(170, 50)" class="block2">
    <rect x="0" y="20" width="65" height="65" rx="8" fill="#e8ecf5" stroke="#6c8ebf" stroke-width="2"/>
    <text x="32" y="42" font-size="10" fill="#4a6a9d" text-anchor="middle" font-weight="bold">BREAK</text>
    <text x="32" y="60" font-size="16" fill="#4a6a9d" text-anchor="middle" font-weight="bold">5:00</text>
    <text x="32" y="78" font-size="9" fill="#6c8ebf" text-anchor="middle">stretch</text>
  </g>

  <!-- Arrow -->
  <g transform="translate(240, 75)" class="arrow2">
    <path d="M0,10 Q12,7 22,10" fill="none" stroke="#bbb" stroke-width="2" stroke-linecap="round"/>
    <polygon points="22,10 17,6 17,14" fill="#bbb"/>
  </g>

  <!-- Round 2 -->
  <g transform="translate(265, 50)" class="block3">
    <rect x="0" y="20" width="110" height="65" rx="8" fill="#e8f5e8" stroke="#4a9d6e" stroke-width="2"/>
    <text x="55" y="45" font-size="11" fill="#2d7a4a" text-anchor="middle" font-weight="bold">WORK</text>
    <text x="55" y="62" font-size="20" fill="#2d7a4a" text-anchor="middle" font-weight="bold">25:00</text>
    <text x="55" y="78" font-size="9" fill="#4a9d6e" text-anchor="middle">deep focus</text>
    <text x="55" y="14" font-size="10" fill="#888" text-anchor="middle">Round 2</text>
  </g>

  <!-- Arrow -->
  <g transform="translate(380, 75)" class="arrow3">
    <path d="M0,10 Q12,7 22,10" fill="none" stroke="#bbb" stroke-width="2" stroke-linecap="round"/>
    <polygon points="22,10 17,6 17,14" fill="#bbb"/>
  </g>

  <!-- Break 2 -->
  <g transform="translate(405, 50)" class="block4">
    <rect x="0" y="20" width="65" height="65" rx="8" fill="#e8ecf5" stroke="#6c8ebf" stroke-width="2"/>
    <text x="32" y="42" font-size="10" fill="#4a6a9d" text-anchor="middle" font-weight="bold">BREAK</text>
    <text x="32" y="60" font-size="16" fill="#4a6a9d" text-anchor="middle" font-weight="bold">5:00</text>
    <text x="32" y="78" font-size="9" fill="#6c8ebf" text-anchor="middle">breathe</text>
  </g>

  <!-- Dots -->
  <g transform="translate(480, 82)" class="block5">
    <circle cx="5" cy="0" r="3" fill="#bbb"/>
    <circle cx="18" cy="0" r="3" fill="#bbb"/>
    <circle cx="31" cy="0" r="3" fill="#bbb"/>
  </g>

  <!-- Round 4 -->
  <g transform="translate(520, 50)" class="block6">
    <rect x="0" y="20" width="110" height="65" rx="8" fill="#e8f5e8" stroke="#4a9d6e" stroke-width="2"/>
    <text x="55" y="45" font-size="11" fill="#2d7a4a" text-anchor="middle" font-weight="bold">WORK</text>
    <text x="55" y="62" font-size="20" fill="#2d7a4a" text-anchor="middle" font-weight="bold">25:00</text>
    <text x="55" y="78" font-size="9" fill="#4a9d6e" text-anchor="middle">final push</text>
    <text x="55" y="14" font-size="10" fill="#888" text-anchor="middle">Round 4</text>
  </g>

  <!-- Arrow to long break -->
  <g transform="translate(635, 75)" class="arrow5">
    <path d="M0,10 Q12,7 22,10" fill="none" stroke="#bbb" stroke-width="2" stroke-linecap="round"/>
    <polygon points="22,10 17,6 17,14" fill="#bbb"/>
  </g>

  <!-- Long Break -->
  <g transform="translate(660, 50)" class="block7">
    <rect x="0" y="20" width="70" height="65" rx="8" fill="#f5e8f0" stroke="#b06ca0" stroke-width="2"/>
    <text x="35" y="40" font-size="9" fill="#8a4a7a" text-anchor="middle" font-weight="bold">LONG</text>
    <text x="35" y="52" font-size="9" fill="#8a4a7a" text-anchor="middle" font-weight="bold">BREAK</text>
    <text x="35" y="72" font-size="14" fill="#8a4a7a" text-anchor="middle" font-weight="bold">15:00</text>
  </g>

  <!-- Full-screen alert illustration -->
  <g transform="translate(130, 150)" class="alert">
    <rect x="0" y="15" width="140" height="75" rx="5" fill="#1a1a2e" stroke="#222" stroke-width="2"/>
    <text x="70" y="40" font-size="9" fill="#fff" text-anchor="middle">Time for a break!</text>
    <text x="70" y="60" font-size="16" fill="#4fc08d" text-anchor="middle" font-weight="bold" class="timer-pulse">05:00</text>
    <rect x="35" y="68" width="70" height="14" rx="4" fill="#4fc08d"/>
    <text x="70" y="79" font-size="8" fill="#1a1a2e" text-anchor="middle">Take a Break</text>

    <path d="M155,50 Q170,45 185,50" fill="none" stroke="#222" stroke-width="1.5" stroke-linecap="round"/>
    <polygon points="185,50 180,45 180,55" fill="#222"/>
    <text x="260" y="40" font-size="11" fill="#222" text-anchor="middle">full-screen alert</text>
    <text x="260" y="55" font-size="11" fill="#222" text-anchor="middle">between rounds</text>
    <text x="260" y="70" font-size="10" fill="#888" text-anchor="middle" font-style="italic">impossible to ignore</text>
  </g>

  <!-- Owl -->
  <g transform="translate(530, 162)" class="owl">
    <circle cx="20" cy="20" r="15" fill="none" stroke="#222" stroke-width="2"/>
    <circle cx="15" cy="18" r="4" fill="none" stroke="#222" stroke-width="1.5"/>
    <circle cx="25" cy="18" r="4" fill="none" stroke="#222" stroke-width="1.5"/>
    <circle cx="15" cy="18" r="1.5" fill="#222">
      <animate attributeName="r" values="1.5;1.5;0.3;0.3;1.5;1.5" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="25" cy="18" r="1.5" fill="#222">
      <animate attributeName="r" values="1.5;1.5;0.3;0.3;1.5;1.5" dur="4s" repeatCount="indefinite"/>
    </circle>
    <polygon points="20,22 18,26 22,26" fill="#e8a030"/>
    <line x1="10" y1="9" x2="7" y2="3" stroke="#222" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="30" y1="9" x2="33" y2="3" stroke="#222" stroke-width="1.5" stroke-linecap="round"/>
    <text x="20" y="48" font-size="10" fill="#666" text-anchor="middle" font-style="italic">Bubo keeps</text>
    <text x="20" y="60" font-size="10" fill="#666" text-anchor="middle" font-style="italic">the rhythm</text>
  </g>
</svg>